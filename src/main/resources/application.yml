spring:
  application:
    name: auth-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:2679941876}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

jwt:
  private-key-location: ${JWT_PRIVATE_KEY_LOCATION:classpath:keys/dev-private.pem}
  public-key-location: ${JWT_PUBLIC_KEY_LOCATION:classpath:keys/dev-public.pem}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:15m}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}
  password-reset-token-expiration: ${JWT_PASSWORD_RESET_TOKEN_EXPIRATION:15m}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:8080}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600
  security:
    max-failed-login-attempts: ${MAX_FAILED_LOGIN_ATTEMPTS:5}
    account-lock-duration-minutes: ${ACCOUNT_LOCK_DURATION_MINUTES:30}
    otp-expiration-minutes: ${OTP_EXPIRATION_MINUTES:10}
    otp-max-attempts: ${OTP_MAX_ATTEMPTS:3}
  email:
    from: ${EMAIL_FROM:noreply@company.com}
    from-name: ${EMAIL_FROM_NAME:Auth API}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  level:
    com.uptask: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
