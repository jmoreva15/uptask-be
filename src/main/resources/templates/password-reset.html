<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:#f4f5f7; margin:0; padding:0; }
        .container { max-width:560px; margin:40px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); }
        .header { background:#dc2626; padding:32px 40px; text-align:center; }
        .header h1 { color:#fff; margin:0; font-size:24px; font-weight:600; }
        .body { padding:40px; }
        .body p { color:#374151; font-size:15px; line-height:1.6; margin:0 0 16px; }
        .otp-box { background:#f3f4f6; border-radius:8px; padding:24px; text-align:center; margin:24px 0; }
        .otp-code { font-size:40px; font-weight:700; letter-spacing:12px; color:#dc2626; font-family:monospace; }
        .expiry { color:#6b7280; font-size:13px; margin-top:8px; }
        .warning { background:#fff7ed; border:1px solid #fed7aa; border-radius:6px; padding:12px 16px; color:#92400e; font-size:13px; margin-top:16px; }
        .footer { padding:24px 40px; border-top:1px solid #e5e7eb; text-align:center; }
        .footer p { color:#9ca3af; font-size:12px; margin:0; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Password Reset</h1>
    </div>
    <div class="body">
        <p>Hello <strong th:text="${name}">User</strong>,</p>
        <p>We received a request to reset your password. Use the code below to proceed:</p>
        <div class="otp-box">
            <div class="otp-code" th:text="${otp}">000000</div>
            <div class="expiry">This code expires in <strong th:text="${expirationMinutes}">10</strong> minutes</div>
        </div>
        <div class="warning">
            If you did not request a password reset, please ignore this email and secure your account immediately.
        </div>
    </div>
    <div class="footer">
        <p>Auth API &mdash; Do not reply to this email.</p>
    </div>
</div>
</body>
</html>
